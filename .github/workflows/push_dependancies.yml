name: Push Dependency Snapshots

on:
  workflow_call:
    secrets:
      DEPENDENCY_WEBHOOK:
        required: true

  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Reusable workflows check out the caller repo, so pull this repo's scripts separately.
      # github.workflow_* is the caller; job.workflow_* is this reusable workflow's repo/commit.
      - name: Checkout webhook scripts
        uses: actions/checkout@v5
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .github-dependancy-webhook
          sparse-checkout: scripts

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Generate Composer dependencies
        run: node .github-dependancy-webhook/scripts/composer-dependencies.js > composer.json.payload

      - name: Generate npm dependencies
        run: node .github-dependancy-webhook/scripts/npm-dependencies.js > npm.json.payload

      - name: Send Composer webhook
        env:
          WEBHOOK_URL: ${{ secrets.DEPENDENCY_WEBHOOK }}
        run: |
          curl \
            --fail-with-body \
            --request POST \
            --header "Content-Type: application/json" \
            --data @composer.json.payload \
            "$WEBHOOK_URL"

      - name: Send npm webhook
        env:
          WEBHOOK_URL: ${{ secrets.DEPENDENCY_WEBHOOK }}
        run: |
          curl \
            --fail-with-body \
            --request POST \
            --header "Content-Type: application/json" \
            --data @npm.json.payload \
            "$WEBHOOK_URL"
