name: Push Dependency Snapshots

on:
  workflow_call:
    secrets:
      DEPENDENCY_WEBHOOK:
        required: true

  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate Composer dependencies
        run: node scripts/composer-dependencies.js > composer.json.payload

      - name: Generate npm dependencies
        run: node scripts/npm-dependencies.js > npm.json.payload

      - name: Send Composer webhook
        env:
          WEBHOOK_URL: ${{ secrets.DEPENDENCY_WEBHOOK }}
        run: |
          curl \
            --fail-with-body \
            --request POST \
            --header "Content-Type: application/json" \
            --data @composer.json.payload \
            "$WEBHOOK_URL"

      - name: Send npm webhook
        env:
          WEBHOOK_URL: ${{ secrets.DEPENDENCY_WEBHOOK }}
        run: |
          curl \
            --fail-with-body \
            --request POST \
            --header "Content-Type: application/json" \
            --data @npm.json.payload \
            "$WEBHOOK_URL"
