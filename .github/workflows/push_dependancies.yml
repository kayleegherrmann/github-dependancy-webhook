name: Push Dependency Snapshots

on:
  workflow_call:
    inputs:
      webhook_url:
        required: true
        type: string

    secrets:
      DEPENDENCY_WEBHOOK_SECRET:
        required: true

  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate Composer dependencies
        run: node scripts/composer-dependencies.js > composer.json.payload

      - name: Generate npm dependencies
        run: node scripts/npm-dependencies.js > npm.json.payload

      - name: Send Composer webhook
        env:
          WEBHOOK_URL: ${{ inputs.webhook_url }}
          WEBHOOK_SECRET: ${{ secrets.DEPENDENCY_WEBHOOK_SECRET }}
        run: |
          curl \
            --fail-with-body \
            --request POST \
            --header "Content-Type: application/json" \
            --header "X-Signature: $(openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" composer.json.payload)" \
            --data @composer.json.payload \
            "$WEBHOOK_URL"

      - name: Send npm webhook
        env:
          WEBHOOK_URL: ${{ inputs.webhook_url }}
          WEBHOOK_SECRET: ${{ secrets.DEPENDENCY_WEBHOOK_SECRET }}
        run: |
          curl \
            --fail-with-body \
            --request POST \
            --header "Content-Type: application/json" \
            --header "X-Signature: $(openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" npm.json.payload)" \
            --data @npm.json.payload \
            "$WEBHOOK_URL"